<!doctype html>
<html lang="en" class="light-mode">
<head>
<meta charset="utf-8">
<title>compsci flashcards</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<script>
    // Resolve theme to a concrete class before paint, to avoid a flash and to
    // explicitly override the "light-mode" default class on <html>.
    (function () {
        var t = localStorage.getItem('flashcards_theme');
        var dark = (t === 'dark') || (t !== 'light' && window.matchMedia &&
                   window.matchMedia('(prefers-color-scheme: dark)').matches);
        var html = document.documentElement;
        html.classList.remove('light-mode', 'dark-mode');
        html.classList.add(dark ? 'dark-mode' : 'light-mode');
    })();
</script>
<link rel="stylesheet" href="styles.css?v=3">
</head>
<body>
<header>
    <h1>compsci flashcards</h1>
    <span id="stats"></span>
    <button id="themeBtn" title="cycle auto / light / dark">theme: auto</button>
    <button id="resetBtn" title="wipe local progress">reset</button>
</header>
<main id="stage"></main>
<script>
    // List of SQLite .db files to load. Add more decks here.
    window.DECKS = ['cards/compsci.db'];
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.11.0/sql-wasm.js"></script>
<script src="app.js?v=3"></script>
</body>
</html>
